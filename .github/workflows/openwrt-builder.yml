name: OpenWrt Native ImageBuilder

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Versi OpenWrt (contoh: 25.12.5, SNAPSHOT)'
        required: true
        default: '25.12.5'
      target:
        description: 'Target (contoh: armsr/armv8)'
        required: true
        default: 'armsr/armv8'
      profile:
        description: 'Profile (contoh: generic)'
        required: true
        default: 'generic'
      packages:
        description: 'Paket tambahan (pisahkan spasi)'
        required: false
        default: 'luci luci-ssl kmod-usb-net kmod-usb-net-rtl8152 fdisk blkid wget curl nano htop'

jobs:
  build:
    name: Build OpenWrt Firmware
    runs-on: ubuntu-latest
    
    steps:
      - name: Install Dependensi Build
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 qemu-utils zstd

      - name: Download & Jalankan ImageBuilder
        run: |
          RELEASE="${{ github.event.inputs.release }}"
          TARGET="${{ github.event.inputs.target }}"
          PROFILE="${{ github.event.inputs.profile }}"
          PACKAGES="${{ github.event.inputs.packages }}"

          TARGET_DASHED=$(echo $TARGET | tr / -)
          
          # Tentukan Base URL
          if [ "$RELEASE" == "SNAPSHOT" ]; then
            BASE_URL="https://downloads.openwrt.org/snapshots/targets/${TARGET}"
          else
            BASE_URL="https://downloads.openwrt.org/releases/${RELEASE}/targets/${TARGET}"
          fi

          FILE_PREFIX="openwrt-imagebuilder-${RELEASE}-${TARGET_DASHED}.Linux-x86_64"
          
          # Cek apakah pakai .zst atau .tar.xz
          if wget -q --spider "${BASE_URL}/${FILE_PREFIX}.tar.zst"; then
            FILE_NAME="${FILE_PREFIX}.tar.zst"
          else
            FILE_NAME="${FILE_PREFIX}.tar.xz"
          fi

          echo "Mengunduh: ${BASE_URL}/${FILE_NAME}"
          wget -q "${BASE_URL}/${FILE_NAME}" || { echo "Gagal mengunduh ImageBuilder!"; exit 1; }
          
          # Ekstrak (otomatis menangani .zst atau .xz)
          tar -xf "${FILE_NAME}"
          
          # Masuk ke folder (mencari folder yang baru saja diekstrak)
          cd openwrt-imagebuilder-*
          
          make image PROFILE="$PROFILE" PACKAGES="$PACKAGES"
          
          mkdir -p ../output_firmware
          find bin/targets/ -type f \( -name "*sysupgrade*" -o -name "*factory*" -o -name "*.img.gz" -o -name "*.img" \) -exec cp {} ../output_firmware/ \;

          echo "artifact_name=openwrt-${RELEASE}-${TARGET_DASHED}-${PROFILE}" >> $GITHUB_ENV

      - name: Upload Firmware ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: output_firmware/
