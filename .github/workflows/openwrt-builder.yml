name: OpenWrt Custom Image Builder

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Versi OpenWrt (contoh: 23.05.3, 25.12.5, SNAPSHOT)'
        required: true
        default: '25.12.5'
      target:
        description: 'Target (contoh: armsr/armv8)'
        required: true
        default: 'armsr/armv8'
      profile:
        description: 'Profile (contoh: generic)'
        required: true
        default: 'generic'
      disk_size:
        description: 'Ukuran Total Disk Image'
        required: true
        default: '1G'
        type: choice
        options:
          - 1G
          - 2G
          - 4G
          - 8G
      packages:
        description: 'Paket tambahan (pisahkan spasi)'
        required: false
        default: 'luci luci-ssl kmod-usb-net kmod-usb-net-rtl8152 fdisk blkid wget curl nano htop'

permissions:
  contents: write

jobs:
  build:
    name: Build & Pack Custom Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependensi Build
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 qemu-utils zstd parted e2fsprogs dosfstools

      - name: Download & Jalankan ImageBuilder
        run: |
          RELEASE="${{ github.event.inputs.release }}"
          TARGET="${{ github.event.inputs.target }}"
          PROFILE="${{ github.event.inputs.profile }}"
          PACKAGES="${{ github.event.inputs.packages }}"

          TARGET_DASHED="${TARGET//\//-}"
          
          if [ "$RELEASE" == "SNAPSHOT" ]; then
            BASE_URL="https://downloads.openwrt.org/snapshots/targets/${TARGET}"
            FILE_PREFIX="openwrt-imagebuilder-${TARGET_DASHED}.Linux-x86_64"
          else
            BASE_URL="https://downloads.openwrt.org/releases/${RELEASE}/targets/${TARGET}"
            FILE_PREFIX="openwrt-imagebuilder-${RELEASE}-${TARGET_DASHED}.Linux-x86_64"
          fi
          
          if wget -q --spider "${BASE_URL}/${FILE_PREFIX}.tar.zst"; then
            FILE_NAME="${FILE_PREFIX}.tar.zst"
          else
            FILE_NAME="${FILE_PREFIX}.tar.xz"
          fi

          echo "Mengunduh: ${BASE_URL}/${FILE_NAME}"
          wget -q "${BASE_URL}/${FILE_NAME}" || { echo "Gagal mengunduh ImageBuilder!"; exit 1; }
          
          tar -xf "${FILE_NAME}"
          rm -f "${FILE_NAME}"
          cd openwrt-imagebuilder-*
          
          make image PROFILE="$PROFILE" PACKAGES="$PACKAGES"
          
          mkdir -p ../output_firmware
          find bin/targets/ -type f \( -name "*.tar.gz" -o -name "*.img.gz" \) -exec cp {} ../output_firmware/ \;

          TIMESTAMP=$(date +%Y%m%d-%H%M)
          echo "TAG_NAME=v${RELEASE}-${TARGET_DASHED}-${PROFILE}-${TIMESTAMP}" >> $GITHUB_ENV
          echo "RELEASE_NAME=OpenWrt ${RELEASE} - Custom Amlogic (${TIMESTAMP})" >> $GITHUB_ENV
          echo "IMG_NAME=custom-openwrt-${RELEASE}-${TARGET_DASHED}-${PROFILE}.img" >> $GITHUB_ENV

      - name: Create Custom Disk Image
        run: |
          cd output_firmware
          
          ROOTFS_TAR=$(find . -name "*-rootfs.tar.gz" | head -n 1)
          
          if [ -z "$ROOTFS_TAR" ]; then
            echo "Error: File rootfs.tar.gz tidak ditemukan!"
            exit 1
          fi

          DISK_SIZE="${{ github.event.inputs.disk_size }}"
          
          echo "Membuat image: ${{ env.IMG_NAME }} sebesar ${DISK_SIZE}..."
          fallocate -l "$DISK_SIZE" "${{ env.IMG_NAME }}"
          
          echo "Membuat tabel partisi MBR/msdos..."
          sudo parted -s "${{ env.IMG_NAME }}" mklabel msdos
          
          echo "Membuat partisi BOOT (128MB)..."
          sudo parted -s "${{ env.IMG_NAME }}" mkpart primary fat32 4MiB 132MiB
          
          echo "Membuat partisi ROOTFS (Sisa Ruang)..."
          sudo parted -s "${{ env.IMG_NAME }}" mkpart primary ext4 132MiB 100%
          
          echo "Memetakan ke loop device..."
          LOOP_DEV=$(sudo losetup -P -f --show "${{ env.IMG_NAME }}")
          sleep 1
          
          echo "Memformat partisi..."
          sudo mkfs.fat -F 32 -n "BOOT" "${LOOP_DEV}p1"
          sudo mkfs.ext4 -F -L "ROOTFS" "${LOOP_DEV}p2"
          
          echo "Mounting partisi..."
          mkdir -p mnt_boot mnt_rootfs
          sudo mount "${LOOP_DEV}p1" mnt_boot
          sudo mount "${LOOP_DEV}p2" mnt_rootfs
          
          echo "[1/4] Menyalin isi folder 'boot' dari repositori ke partisi BOOT..."
          if [ -d "$GITHUB_WORKSPACE/boot" ] && [ "$(ls -A $GITHUB_WORKSPACE/boot)" ]; then
            sudo cp -r $GITHUB_WORKSPACE/boot/* mnt_boot/
          fi
          
          echo "[2/4] Mengekstrak ROOTFS bawaan OpenWrt ke partisi ROOTFS..."
          sudo tar -xzf "$ROOTFS_TAR" -C mnt_rootfs/ --numeric-owner
          
          echo "[3/4] Mengunduh & Mengekstrak Kernel (Image, dtb) Amlogic ke partisi BOOT..."
          wget -q "https://github.com/sib0ndt/linux/releases/download/kernel-amlogic-7.0.0/boot-7.0.0.tar.gz" -O custom-boot.tar.gz
          sudo tar -xzf custom-boot.tar.gz -C mnt_boot/ --no-same-owner
          
          echo "[4/4] Mengunduh & Mengekstrak Kernel Modules Amlogic ke partisi ROOTFS..."
          wget -q "https://github.com/sib0ndt/linux/releases/download/kernel-amlogic-7.0.0/rootfs-7.0.0.tar.gz" -O custom-rootfs.tar.gz
          # Menggunakan --numeric-owner agar permission folder modules tetap root
          sudo tar -xzf custom-rootfs.tar.gz -C mnt_rootfs/ --numeric-owner
          
          echo "Melepas mount dan loop device..."
          sudo umount mnt_boot mnt_rootfs
          sudo losetup -d "$LOOP_DEV"
          
          echo "Mengompresi hasil akhir..."
          gzip -9 "${{ env.IMG_NAME }}"
          
          # Hapus file mentahan agar rilis bersih
          rm -f openwrt-*.img.gz openwrt-*.tar.gz custom-boot.tar.gz custom-rootfs.tar.gz
          
          echo "✅ Selesai merakit image berukuran ${DISK_SIZE} dengan Kernel Amlogic!"

      - name: Upload Firmware ke GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: output_firmware/*.img.gz
          body: |
            ### Custom OpenWrt Firmware Build 🚀
            - **Versi:** `${{ github.event.inputs.release }}`
            - **Target:** `${{ github.event.inputs.target }}`
            - **Profile:** `${{ github.event.inputs.profile }}`
            - **Ukuran Total Disk:** `${{ github.event.inputs.disk_size }}`
            - **Kernel Injeksi:** `Amlogic 7.0.0`
            - **Layout Disk:** `BOOT (FAT32 Custom, 128MB)` + `ROOTFS (EXT4, Sisa Kapasitas)`
            
            *Dibangun & dirakit secara otomatis menggunakan GitHub Actions.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
